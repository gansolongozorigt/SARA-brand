<style>
:root{
  --ivory:#f7f2e9; --cream:#efe6d6; --paper:#fbf8f1;
  --gold:#b4923c; --gold2:#d9bd7e; --gold3:#8c6f2a; --gold-soft:#e7cd8f;
  --mint:#bfe0d0; --mint2:#8cc6ab; --mint-deep:#4f8e74;
  --forest:#2c4a3c; --ink:#26241f; --muted:#7a7367; --line:rgba(140,111,42,.18);
  --gold-grad:linear-gradient(135deg,#e7cd8f 0%,#b4923c 42%,#8c6f2a 72%,#dcc184 100%);
  --m1:#d9bd7e; --m2:#b4923c;
  --serif:'Cormorant Garamond','Noto Serif SC',Georgia,serif;
  --sans:'Manrope','Noto Sans SC',sans-serif;
  --shadow:0 24px 60px -28px rgba(60,46,12,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans); color:var(--ink); background:var(--ivory);
  overflow-x:hidden; line-height:1.6; -webkit-font-smoothing:antialiased;
}
body.cn{font-family:'Noto Sans SC',var(--sans)}
::selection{background:var(--gold2);color:#1d1b16}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
h1,h2,h3,.serif{font-family:var(--serif)}
.gold-text{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- atmosphere ---------- */
.bg-atmos{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;transition:background 2.4s ease}
.orb.a{width:50vw;height:50vw;top:-12vw;left:-10vw;background:radial-gradient(circle,var(--m1),transparent 68%)}
.orb.b{width:46vw;height:46vw;bottom:-14vw;right:-8vw;background:radial-gradient(circle,var(--m2),transparent 68%);opacity:.4}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
.sparkles{position:fixed;inset:0;z-index:1;pointer-events:none}
.sparkle{position:absolute;width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,var(--m1),transparent 70%);opacity:0;
  animation:floatUp linear infinite}
@keyframes floatUp{0%{opacity:0;transform:translateY(20px) scale(.4)}15%{opacity:.9}85%{opacity:.7}100%{opacity:0;transform:translateY(-120px) scale(1.1)}}
.wrap{position:relative;z-index:2}

/* ---------- top bar ---------- */
.topbar{background:var(--forest);color:#eadfca;font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;text-align:center;font-weight:500;overflow:hidden;position:relative;height:38px;line-height:38px}
.topbar .roll{position:absolute;left:0;right:0;top:0;opacity:0;padding:0 16px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;animation:annCycle 13.5s infinite}
.topbar .roll:nth-child(2){animation-delay:4.5s}
.topbar .roll:nth-child(3){animation-delay:9s}
@keyframes annCycle{0%{opacity:0}3%,28%{opacity:1}31%,100%{opacity:0}}

/* ---------- nav ---------- */
header{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
  background:rgba(247,242,233,.72);border-bottom:1px solid var(--line);transition:.3s}
header.scrolled{background:rgba(247,242,233,.92);box-shadow:0 10px 30px -22px rgba(60,46,12,.5)}
.nav{max-width:1240px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.42em;padding-left:.42em}
.brand span{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.navlinks{position:relative;display:flex;gap:6px}
.navlinks .pill{position:absolute;top:0;height:100%;border-radius:40px;
  background:linear-gradient(135deg,rgba(180,146,60,.16),rgba(79,142,116,.14));
  border:1px solid var(--line);transition:transform .45s cubic-bezier(.2,.8,.2,1),width .45s cubic-bezier(.2,.8,.2,1),opacity .3s;opacity:0;z-index:0}
.navlinks a{position:relative;z-index:1;padding:9px 18px;font-size:13.5px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .3s}
.navlinks a:hover,.navlinks a.active{color:var(--gold3)}
.navtools{display:flex;align-items:center;gap:14px}
.lang{display:flex;border:1px solid var(--line);border-radius:30px;overflow:hidden}
.lang button{padding:6px 11px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);transition:.25s}
.lang button.on{background:var(--gold-grad);color:#241c08}
.cartbtn{position:relative;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
  display:grid;place-items:center;background:var(--paper);transition:.25s}
.cartbtn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -10px rgba(60,46,12,.5)}
.cartbtn svg{width:20px;height:20px;stroke:var(--gold3)}
.cartcount{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;padding:0 5px;border-radius:20px;
  background:var(--forest);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;
  transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.cartcount.show{transform:scale(1)}
.burger{display:none;flex-direction:column;gap:5px;width:30px}
.burger span{height:2px;background:var(--gold3);border-radius:2px;transition:.3s}

/* ---------- hero ---------- */
.hero{max-width:1240px;margin:0 auto;padding:54px 26px 88px;
  display:grid;grid-template-columns:.92fr 1.08fr;gap:30px;align-items:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--mint-deep);font-weight:700;margin-bottom:18px}
.hero-badge::before{content:"";width:26px;height:1px;background:var(--mint-deep)}
.hero h1{font-size:clamp(58px,9vw,118px);line-height:.92;font-weight:600;letter-spacing:.02em}
.hero h1 .sub{display:block;font-size:clamp(20px,3vw,30px);font-style:italic;font-weight:500;
  letter-spacing:.02em;color:var(--forest);margin-top:8px}
.hero p.lead{margin:22px 0 30px;max-width:430px;color:var(--muted);font-size:16.5px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.btn{padding:15px 30px;border-radius:40px;font-weight:600;font-size:14px;letter-spacing:.06em;
  text-transform:uppercase;transition:.3s;display:inline-flex;align-items:center;gap:9px}
.btn-gold{background:var(--gold-grad);color:#241c08;box-shadow:0 14px 30px -14px rgba(180,146,60,.8)}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 20px 38px -14px rgba(180,146,60,.9)}
.btn-out{border:1px solid var(--gold);color:var(--gold3)}
.btn-out:hover{background:var(--gold);color:#241c08}

/* ---------- coverflow ---------- */
.stage{position:relative;height:520px;perspective:1700px}
.coverflow{position:absolute;inset:0;transform-style:preserve-3d}
.cf-item{position:absolute;left:50%;top:50%;width:248px;height:360px;margin:-180px 0 0 -124px;
  transform-style:preserve-3d;cursor:pointer;transition:transform .75s cubic-bezier(.21,.78,.27,1),opacity .6s;
  border-radius:20px;overflow:hidden;background:var(--paper);
  box-shadow:0 30px 60px -28px rgba(50,38,10,.6);border:1px solid rgba(255,255,255,.6)}
.cf-item img{width:100%;height:100%;object-fit:cover}
.cf-item .glow{position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(28,24,16,.55));opacity:0;transition:.5s}
.cf-item.active .glow{opacity:1}
.cf-cap{position:absolute;left:0;right:0;bottom:0;padding:16px 18px;color:#fff;
  transform:translateY(12px);opacity:0;transition:.5s .1s}
.cf-item.active .cf-cap{transform:none;opacity:1}
.cf-cap h4{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1.1}
.cf-cap .pr{font-size:13px;color:var(--gold2);font-weight:600;margin-top:3px;letter-spacing:.04em}
.cf-tip{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:11.5px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.cf-arrows{position:absolute;bottom:-64px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:5}
.cf-arrows button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--paper);
  display:grid;place-items:center;transition:.25s}
.cf-arrows button:hover{background:var(--gold-grad);transform:scale(1.08)}
.cf-arrows svg{width:18px;height:18px;stroke:var(--gold3)}
.cf-arrows button:hover svg{stroke:#241c08}

/* ---------- marquee ---------- */
.marquee{margin-top:30px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:16px 0;overflow:hidden;white-space:nowrap;background:rgba(251,248,241,.5)}
.marquee .track{display:inline-block;animation:scroll 26s linear infinite}
.marquee span{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--forest);margin:0 30px}
.marquee span::after{content:"✦";color:var(--gold);margin-left:60px;font-style:normal;font-size:14px;vertical-align:middle}
@keyframes scroll{to{transform:translateX(-50%)}}

/* ---------- products ---------- */
section{position:relative;z-index:2}
.sec-head{text-align:center;max-width:660px;margin:0 auto;padding:74px 26px 8px}
.sec-kick{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold3);font-weight:700}
.sec-head h2{font-size:clamp(36px,6vw,62px);font-weight:600;line-height:1.04;margin:12px 0}
.sec-head p{color:var(--muted);font-size:16px}
.grid{max-width:1240px;margin:0 auto;padding:34px 26px 20px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.card{position:relative;display:flex;flex-direction:column;border-radius:20px;overflow:hidden;background:var(--paper);
  border:1px solid var(--line);box-shadow:0 18px 40px -30px rgba(50,38,10,.5);
  transition:transform .5s cubic-bezier(.2,.8,.2,1),box-shadow .5s;cursor:pointer;transform-style:preserve-3d}
.card:hover{transform:translateY(-8px);box-shadow:0 34px 60px -28px rgba(80,60,12,.55)}
.card .ph{position:relative;aspect-ratio:1/1.12;overflow:hidden;background:linear-gradient(160deg,#fdfbf6,#f0e7d6)}
.card .ph img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.card:hover .ph img{transform:scale(1.06)}
.tag{position:absolute;top:12px;left:12px;background:var(--forest);color:#eadfca;font-size:10.5px;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:30px}
.card .body{padding:16px 16px 18px;display:flex;flex-direction:column;flex:1}
.card .body h3{font-size:21px;font-weight:600;line-height:1.12}
.card .body .short{color:var(--muted);font-size:13px;margin-top:4px;min-height:34px}
.card .priceline{display:flex;align-items:baseline;gap:8px;margin-top:10px}
.card .price{font-weight:700;font-size:17px;color:var(--gold3)}
.card .old{font-size:13px;color:var(--muted);text-decoration:line-through}
.card .quick{margin-top:auto;width:100%;justify-content:center;background:var(--mint-deep);
  padding:11px 16px;font-size:12px;letter-spacing:.04em}
.card .quick:hover{background:#3d7a62}
.card .quick.added{background:#27503f}
.card .priceline{margin-bottom:14px}

/* ---------- morph add-to-cart ---------- */
.atc{position:relative;overflow:hidden;background:var(--ink);color:#f3ead6;border-radius:40px;
  padding:13px 22px;font-size:13px;font-weight:600;letter-spacing:.05em;display:flex;align-items:center;
  justify-content:center;gap:9px;transition:.35s}
.atc:hover{background:var(--forest)}
.atc .lbl,.atc .done{display:flex;align-items:center;gap:8px;transition:.4s}
.atc .done{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(120%)}
.atc svg{width:17px;height:17px}
.atc.added{background:var(--mint-deep)}
.atc.added .lbl{opacity:0;transform:translateY(-120%)}
.atc.added .done{opacity:1;transform:none}
.atc .cartfly{position:absolute;left:-30px;top:50%;transform:translateY(-50%);opacity:0}
.atc.added .cartfly{animation:fly .7s ease}
@keyframes fly{0%{left:-30px;opacity:1}60%{opacity:1}100%{left:115%;opacity:0}}

/* ---------- about ---------- */
.about{max-width:1240px;margin:40px auto;padding:30px 26px;
  display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:center}
.about-img{position:relative;border-radius:22px;overflow:hidden;box-shadow:var(--shadow)}
.about-img::after{content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.5);border-radius:22px}
.about-img img{width:100%;aspect-ratio:1/1;object-fit:cover}
.about-txt .sec-kick{color:var(--mint-deep)}
.about-txt h2{font-family:var(--serif);font-size:clamp(32px,5vw,52px);font-weight:600;margin:12px 0 18px;line-height:1.06}
.about-txt p{color:var(--muted);margin-bottom:14px}
.about-stats{display:flex;gap:32px;margin-top:24px}
.about-stats .n{font-family:var(--serif);font-size:38px;font-weight:600;color:var(--gold3)}
.about-stats .l{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* ---------- contact strip ---------- */
.contactstrip{background:var(--forest);color:#f0e7d4;margin-top:30px}
.contactstrip .in{max-width:1240px;margin:0 auto;padding:46px 26px;display:flex;
  align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.contactstrip h3{font-family:var(--serif);font-size:clamp(26px,4vw,40px);font-weight:500;font-style:italic}
.contactstrip .phone{font-family:var(--serif);font-size:34px;font-weight:600}
.contactstrip .phone a{transition:.3s}
.contactstrip .phone a:hover{color:var(--gold2)}

/* ---------- footer ---------- */
footer{background:var(--ink);color:#cfc6b4;padding:54px 26px 28px}
.foot{max-width:1240px;margin:0 auto;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:34px}
.foot .brand{font-size:34px;color:#fff;margin-bottom:14px}
.foot p{font-size:14px;color:#9c9483;max-width:320px}
.foot h5{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);margin-bottom:14px}
.foot ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.foot ul li{font-size:14px;color:#b8af9c;transition:.25s;cursor:pointer}
.foot ul li:hover{color:#fff}
.foot-bottom{max-width:1240px;margin:34px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12.5px;color:#8a8270}

/* ---------- dock ---------- */
.dock{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:45;
  display:flex;align-items:flex-end;gap:6px;padding:9px 14px;border-radius:26px;
  background:rgba(251,248,241,.7);backdrop-filter:blur(16px);border:1px solid var(--line);
  box-shadow:0 18px 44px -18px rgba(60,46,12,.5)}
.dock .di{width:46px;height:46px;border-radius:14px;overflow:hidden;transition:transform .2s ease,margin .2s ease;
  transform-origin:bottom center;cursor:pointer;border:1px solid rgba(255,255,255,.6);background:#fff;position:relative}
.dock .di img{width:100%;height:100%;object-fit:cover}
.dock .di::after{content:attr(data-name);position:absolute;bottom:120%;left:50%;transform:translateX(-50%) scale(.9);
  background:var(--ink);color:#f3ead6;font-size:11px;white-space:nowrap;padding:5px 9px;border-radius:8px;
  opacity:0;pointer-events:none;transition:.2s;font-family:var(--sans)}
.dock .di:hover::after{opacity:1;transform:translateX(-50%) scale(1)}

/* ---------- modal ---------- */
.modal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal .ov{position:absolute;inset:0;background:rgba(30,24,12,.5);backdrop-filter:blur(6px);animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{position:relative;z-index:1;width:min(940px,100%);max-height:90vh;overflow:auto;
  background:var(--paper);border-radius:24px;display:grid;grid-template-columns:1fr 1fr;
  box-shadow:0 50px 90px -30px rgba(40,30,8,.7);animation:pop .45s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.sheet .imgcol{position:relative;background:linear-gradient(160deg,#fdfbf6,#ece2d0);
  display:grid;place-items:center;padding:30px;overflow:hidden}
.sheet .imgcol img{max-height:420px;width:auto;border-radius:14px;transition:transform .2s ease;
  filter:drop-shadow(0 30px 40px rgba(60,46,12,.35))}
.sheet .info{padding:34px 34px 30px}
.sheet .info .k{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold3);font-weight:700}
.sheet .info h2{font-family:var(--serif);font-size:38px;font-weight:600;line-height:1.05;margin:8px 0 4px}
.sheet .info .stagline{font-style:italic;color:var(--mint-deep);font-family:var(--serif);font-size:19px;margin-bottom:14px}
.sheet .info .desc{color:var(--muted);font-size:14.5px;margin-bottom:18px}
.sheet .specs{list-style:none;border-top:1px solid var(--line);padding-top:14px;margin-bottom:18px;display:grid;gap:9px}
.sheet .specs li{font-size:13.5px;display:flex;gap:9px;align-items:flex-start;color:var(--ink)}
.sheet .specs li::before{content:"✦";color:var(--gold);font-size:11px;margin-top:3px}
.sheet .buyrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sheet .pricebig{display:flex;align-items:baseline;gap:9px}
.sheet .pricebig .p{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--gold3)}
.sheet .pricebig .o{font-size:16px;color:var(--muted);text-decoration:line-through}
.qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:30px;overflow:hidden}
.qty button{width:38px;height:42px;font-size:18px;color:var(--gold3)}
.qty span{width:34px;text-align:center;font-weight:600}
.sheet .atc{flex:1;min-width:170px;padding:15px 22px;font-size:14px}
.mclose{position:absolute;top:14px;right:14px;z-index:3;width:40px;height:40px;border-radius:50%;
  background:rgba(251,248,241,.9);display:grid;place-items:center;box-shadow:0 6px 16px -8px rgba(0,0,0,.4)}
.mclose svg{width:18px;height:18px;stroke:var(--ink)}

/* ---------- cart drawer ---------- */
.drawer{position:fixed;inset:0;z-index:90;display:none}
.drawer.open{display:block}
.drawer .ov{position:absolute;inset:0;background:rgba(30,24,12,.45);animation:fade .3s}
.drawer .panel{position:absolute;right:0;top:0;height:100%;width:min(420px,100%);background:var(--paper);
  display:flex;flex-direction:column;box-shadow:-30px 0 70px -30px rgba(40,30,8,.6);
  transform:translateX(100%);transition:transform .45s cubic-bezier(.2,.8,.2,1)}
.drawer.open .panel{transform:none}
.drawer .dh{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid var(--line)}
.drawer .dh h3{font-family:var(--serif);font-size:26px;font-weight:600}
.drawer .items{flex:1;overflow:auto;padding:14px 24px}
.citem{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.citem img{width:64px;height:74px;object-fit:cover;border-radius:10px;flex-shrink:0}
.citem .cd{flex:1}
.citem .cd h4{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1.1}
.citem .cd .cp{color:var(--gold3);font-weight:700;font-size:14px;margin-top:3px}
.citem .crow{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.miniqty{display:flex;align-items:center;border:1px solid var(--line);border-radius:20px}
.miniqty button{width:28px;height:28px;color:var(--gold3)}
.miniqty span{width:24px;text-align:center;font-size:13px;font-weight:600}
.rm{font-size:12px;color:var(--muted);text-decoration:underline;text-underline-offset:2px}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-family:var(--serif);font-style:italic;font-size:20px}
.dfoot{padding:20px 24px;border-top:1px solid var(--line)}
.dfoot .totrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.dfoot .totrow .t{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.dfoot .totrow .v{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--gold3)}
.dfoot .btn{width:100%;justify-content:center}

/* ---------- filters ---------- */
.filters{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:900px;margin:8px auto 0;padding:0 26px}
.filters button{padding:9px 18px;border-radius:30px;border:1px solid var(--line);background:var(--paper);
  font-size:12.5px;font-weight:600;letter-spacing:.05em;color:var(--muted);transition:.25s}
.filters button:hover{border-color:var(--gold)}
.filters button.on{background:var(--gold-grad);color:#241c08;border-color:transparent}

/* ---------- info / delivery ---------- */
.info-sec{max-width:1240px;margin:50px auto;padding:0 26px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.info-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center;
  box-shadow:0 18px 40px -32px rgba(50,38,10,.5);transition:.4s}
.info-card:hover{transform:translateY(-5px)}
.info-card .ic{width:54px;height:54px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;
  background:linear-gradient(135deg,rgba(180,146,60,.16),rgba(79,142,116,.16))}
.info-card .ic svg{width:26px;height:26px;stroke:var(--gold3)}
.info-card h4{font-family:var(--serif);font-size:23px;font-weight:600;margin-bottom:6px}
.info-card p{font-size:13.5px;color:var(--muted)}

/* ---------- reviews ---------- */
.reviews{background:linear-gradient(180deg,transparent,rgba(191,224,208,.18),transparent);padding:30px 0 10px}
.rev-grid{max-width:1240px;margin:0 auto;padding:24px 26px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.rev{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 18px 40px -34px rgba(50,38,10,.5)}
.rev .stars{color:var(--gold);letter-spacing:3px;font-size:15px;margin-bottom:10px}
.rev p{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.4;color:var(--ink);margin-bottom:16px}
.rev .who{display:flex;align-items:center;gap:11px}
.rev .av{width:42px;height:42px;border-radius:50%;background:var(--gold-grad);display:grid;place-items:center;
  font-family:var(--serif);font-weight:700;color:#241c08;font-size:18px}
.rev .who .nm{font-weight:700;font-size:14px}
.rev .who .rl{font-size:12px;color:var(--muted)}

/* ---------- auth + checkout shared ---------- */
.sheet.narrow{grid-template-columns:1fr;width:min(440px,100%)}
.sheet.narrow .info{padding:36px 34px 32px}
.tabs{display:flex;gap:8px;background:rgba(180,146,60,.1);padding:5px;border-radius:30px;margin-bottom:22px}
.tabs button{flex:1;padding:10px;border-radius:30px;font-weight:600;font-size:13px;color:var(--muted);transition:.25s}
.tabs button.on{background:var(--paper);color:var(--gold3);box-shadow:0 4px 12px -6px rgba(60,46,12,.4)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
.field input,.field select{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:12px;
  background:#fff;font-family:inherit;font-size:14px;color:var(--ink);transition:.2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(180,146,60,.15)}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;padding:11px;border:1px solid var(--line);border-radius:12px;font-size:13px;font-weight:600;color:var(--muted);transition:.2s}
.seg button.on{border-color:var(--gold);background:rgba(180,146,60,.1);color:var(--gold3)}
.formnote{font-size:12px;color:var(--muted);margin-top:6px;text-align:center}
.authok{text-align:center;padding:20px 0}
.authok .big{width:64px;height:64px;border-radius:50%;background:var(--mint-deep);display:grid;place-items:center;margin:0 auto 16px}
.authok .big svg{width:32px;height:32px;stroke:#fff}
.authok h3{font-family:var(--serif);font-size:26px;font-weight:600;margin-bottom:6px}
.authok p{color:var(--muted);font-size:14px}
.acctbtn .label{display:none}
.acctbtn.logged{width:auto;padding:0 16px;border-radius:30px;gap:8px;display:flex}
.acctbtn.logged .label{display:inline;font-size:13px;font-weight:600;color:var(--gold3)}

/* ---------- payment ---------- */
.paylist{display:grid;gap:10px;margin:8px 0 16px}
.payopt{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:.2s}
.payopt:hover{border-color:var(--gold)}
.payopt.on{border-color:var(--gold);background:rgba(180,146,60,.08)}
.payopt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;transition:.2s}
.payopt.on .dot{border-color:var(--gold);background:var(--gold);box-shadow:inset 0 0 0 3px var(--paper)}
.payopt .pn{font-weight:600;font-size:14px}
.payopt .pd{font-size:12px;color:var(--muted)}
.payopt .logo{margin-left:auto;font-family:var(--serif);font-weight:700;font-size:15px;color:var(--gold3)}
.summbox{background:rgba(180,146,60,.07);border-radius:14px;padding:16px;margin-bottom:16px}
.summrow{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;color:var(--muted)}
.summrow.tot{font-family:var(--serif);font-size:22px;color:var(--gold3);font-weight:600;border-top:1px solid var(--line);padding-top:10px;margin-top:4px}

.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s ease,transform .8s cubic-bezier(.2,.8,.2,1)}
.reveal.in{opacity:1;transform:none}

/* ---------- responsive ---------- */
@media(max-width:980px){
  .hero{grid-template-columns:1fr;padding-top:34px}
  .stage{height:430px;order:-1}
  .about{grid-template-columns:1fr;gap:26px}
  .grid{grid-template-columns:repeat(2,1fr)}
  .info-sec,.rev-grid{grid-template-columns:1fr}
  .sheet{grid-template-columns:1fr;max-height:92vh}
  .sheet .imgcol{padding:24px}
  .sheet .imgcol img{max-height:260px}
  .foot{grid-template-columns:1fr 1fr}
  .dock{display:none}
}
@media(max-width:680px){
  body{font-size:15px}
  .topbar{font-size:10px;letter-spacing:.05em}
  .nav{padding:12px 18px}
  .navlinks{display:none}
  .burger{display:flex}
  .brand{font-size:22px;letter-spacing:.32em}
  .navtools{gap:10px}
  .cartbtn{width:40px;height:40px}
  .hero{padding:22px 22px 64px;gap:14px}
  .hero-badge{font-size:11px;margin-bottom:12px}
  .hero h1{font-size:clamp(44px,13vw,58px)}
  .hero h1 .sub{font-size:17px;margin-top:6px}
  .hero p.lead{font-size:14px;margin:14px 0 20px}
  .btn{padding:12px 22px;font-size:12px}
  .stage{height:368px}
  .cf-item{width:178px;height:262px;margin:-131px 0 0 -89px}
  .cf-cap h4{font-size:16px}
  .cf-tip{font-size:10.5px}
  .marquee{padding:13px 0;margin-top:22px}
  .marquee span{font-size:19px;margin:0 18px}
  .sec-head{padding:46px 22px 2px}
  .sec-head h2{font-size:clamp(28px,8vw,36px)}
  .sec-head p{font-size:13.5px}
  .filters{gap:7px;padding:0 16px}
  .filters button{padding:8px 13px;font-size:11.5px}
  .grid{padding:22px 18px 14px;gap:14px}
  .card .body{padding:13px 14px 15px}
  .card .body h3{font-size:18px}
  .card .body .short{font-size:12px;min-height:28px}
  .card .price{font-size:15px}
  .card .quick{padding:10px 12px;font-size:11px}
  .about{padding:22px;gap:20px;margin:22px auto}
  .about-txt h2{font-size:clamp(26px,7vw,36px)}
  .about-stats{gap:20px;margin-top:18px}
  .about-stats .n{font-size:28px}
  .about-stats .l{font-size:11px}
  .info-sec{margin:32px auto;gap:14px;padding:0 18px}
  .info-card{padding:24px 22px}
  .info-card h4{font-size:20px}
  .reviews{padding:18px 0 4px}
  .rev-grid{padding:16px 18px;gap:14px}
  .rev{padding:22px 20px}
  .rev p{font-size:16px}
  .contactstrip .in{padding:34px 22px;flex-direction:column;text-align:center;gap:14px}
  .contactstrip .phone{font-size:26px}
  footer{padding:40px 22px 24px}
  .foot{grid-template-columns:1fr;gap:24px}
  .foot .brand{font-size:28px}
  .foot p{font-size:13px}
  .modal{padding:12px}
  .sheet .info{padding:24px 22px 26px}
  .sheet .info h2{font-size:28px}
  .sheet .specs li{font-size:13px}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr;gap:16px;padding:22px 22px 14px}
  .card .body h3{font-size:21px}
  .card .body .short{font-size:13px}
  .card .price{font-size:17px}
  .card .quick{padding:12px 16px;font-size:12px}
}
.mobnav{display:none;position:fixed;inset:0;z-index:60;background:var(--ivory);padding:80px 28px;flex-direction:column;gap:6px}
.mobnav.open{display:flex}
.mobnav a{font-family:var(--serif);font-size:30px;font-weight:600;padding:9px 0;border-bottom:1px solid var(--line)}
</style>

let lang="mn", cart=[], qVal=1, current=null, cfIndex=0;
const fmt = n => n.toLocaleString("en-US")+"₮";
const T = ()=>I18N[lang];

/* ============ I18N APPLY ============ */
function applyI18N(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n"); if(T()[k]!=null) el.textContent=T()[k];
  });
  document.documentElement.lang = lang==="cn"?"zh":lang;
  document.body.classList.toggle("cn", lang==="cn");
  renderGrid(); renderCart(); buildMarquee(); buildCoverflow();
  renderFilters(); renderReviews(); updateAcct();
  if(current) fillModal(current);
}

/* ============ MARQUEE ============ */
function buildMarquee(){
  const words = PRODUCTS.slice(0,8).map(p=>p.name[lang].split(" ")[0]);
  const html = words.map(w=>`<span>${w}</span>`).join("");
  document.getElementById("mq").innerHTML = html+html;
}

/* ============ COVERFLOW ============ */
function buildCoverflow(){
  const cf=document.getElementById("coverflow"); cf.innerHTML="";
  HERO_IDS.forEach((id,i)=>{
    const p=PRODUCTS.find(x=>x.id===id);
    const d=document.createElement("div"); d.className="cf-item"; d.dataset.i=i;
    d.innerHTML=`<img src="${IMG[p.img]}" alt=""><div class="glow"></div>
      <div class="cf-cap"><h4>${p.name[lang].split(" ").slice(0,3).join(" ")}</h4><div class="pr">${fmt(p.price)}</div></div>`;
    d.addEventListener("click",()=>{ if(i===cfIndex) openModal(p.id); else { cfIndex=i; layoutCF(); } });
    cf.appendChild(d);
  });
  layoutCF();
}
function layoutCF(){
  const items=[...document.querySelectorAll(".cf-item")]; const n=items.length;
  items.forEach((it,i)=>{
    let diff=i-cfIndex;
    if(diff>n/2) diff-=n; if(diff<-n/2) diff+=n;
    const abs=Math.abs(diff);
    it.style.transform=`translateX(${diff*150}px) translateZ(${abs===0?0:-260}px) rotateY(${diff*-34}deg) scale(${abs===0?1:.82})`;
    it.style.opacity = abs>2?0:1;
    it.style.zIndex = 10-abs;
    it.style.pointerEvents = abs>2?"none":"auto";
    it.classList.toggle("active",abs===0);
  });
  const mood = MOODS[PRODUCTS.find(x=>x.id===HERO_IDS[cfIndex]).mood];
  document.documentElement.style.setProperty("--m1",mood[0]);
  document.documentElement.style.setProperty("--m2",mood[1]);
}
function cfMove(dir){ const n=HERO_IDS.length; cfIndex=(cfIndex+dir+n)%n; layoutCF(); }
document.getElementById("cfPrev").onclick=()=>cfMove(-1);
document.getElementById("cfNext").onclick=()=>cfMove(1);
let cfTimer=setInterval(()=>cfMove(1),4200);
document.querySelector(".stage").addEventListener("mouseenter",()=>clearInterval(cfTimer));
document.querySelector(".stage").addEventListener("mouseleave",()=>cfTimer=setInterval(()=>cfMove(1),4200));

/* ============ MODAL ============ */
function fillModal(id){
  const p=PRODUCTS.find(x=>x.id===id); if(!p)return;
  document.getElementById("mImg").src=IMG[p.img];
  document.getElementById("mTag").textContent=p.tag[lang];
  document.getElementById("mName").textContent=p.name[lang];
  document.getElementById("mShort").textContent=p.short[lang];
  document.getElementById("mDesc").textContent=p.desc[lang];
  document.getElementById("mSpecs").innerHTML=p.specs[lang].map(s=>`<li>${s}</li>`).join("");
  document.getElementById("mPrice").textContent=fmt(p.price);
  document.getElementById("mOld").textContent=p.old?fmt(p.old):"";
}
function openModal(id){
  current=id; qVal=1; document.getElementById("qVal").textContent=1;
  fillModal(id); document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
}

document.getElementById("qPlus").onclick=()=>{qVal++;document.getElementById("qVal").textContent=qVal;};
document.getElementById("mAdd").onclick=(e)=>{ morph(e.currentTarget); addToCart(current,qVal); };

document.querySelector(".imgcol").addEventListener("mousemove",e=>{
  const r=e.currentTarget.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width-.5, y=(e.clientY-r.top)/r.height-.5;
  document.getElementById("mImg").style.transform=`rotateY(${x*12}deg) rotateX(${-y*12}deg) translateZ(10px)`;
});

/* ============ CART ============ */
function addToCart(id,q){
  const e=cart.find(c=>c.id===id);
  if(e) e.q+=q; else cart.push({id,q});
  renderCart(); pulseCart();
}
function pulseCart(){ const c=document.getElementById("cartCount"); c.style.transform="scale(1.4)"; setTimeout(()=>c.style.transform="",200);}
function renderCart(){
  const wrap=document.getElementById("cartItems"); const count=cart.reduce((a,c)=>a+c.q,0);
  const cc=document.getElementById("cartCount"); cc.textContent=count; cc.classList.toggle("show",count>0);
  if(!cart.length){ wrap.innerHTML=`<div class="empty">${T().emptyCart}</div>`; document.getElementById("subtotal").textContent=fmt(0); return;}
  let total=0;
  wrap.innerHTML=cart.map(c=>{
    const p=PRODUCTS.find(x=>x.id===c.id); total+=p.price*c.q;
    return `<div class="citem">
      <img src="${IMG[p.img]}">
      <div class="cd">
        <h4>${p.name[lang]}</h4><div class="cp">${fmt(p.price)}</div>

          <button class="rm" onclick="removeItem('${c.id}')">${T().remove}</button>
        </div>
      </div></div>`;
  }).join("");
  document.getElementById("subtotal").textContent=fmt(total);
}
function chgQty(id,d){ const e=cart.find(c=>c.id===id); if(!e)return; e.q+=d; if(e.q<=0) cart=cart.filter(c=>c.id!==id); renderCart(); }
function removeItem(id){ cart=cart.filter(c=>c.id!==id); renderCart(); }
function cartTotal(){ return cart.reduce((a,c)=>a+PRODUCTS.find(x=>x.id===c.id).price*c.q,0); }
document.getElementById("cartOpen").onclick=()=>{document.getElementById("drawer").classList.add("open");document.body.style.overflow="hidden";};
document.querySelectorAll("[data-cclose]").forEach(b=>b.onclick=()=>{document.getElementById("drawer").classList.remove("open");document.body.style.overflow="";});

/* ============ CHECKOUT ============ */
function openCheckout(){
  if(!cart.length) return;
  document.getElementById("drawer").classList.remove("open");
  const sub=cartTotal(); const deliv = sub>=100000?0:5000;
  document.getElementById("coSub").textContent=fmt(sub);
  document.getElementById("coDeliv").textContent=deliv===0?(lang==="mn"?"Үнэгүй":lang==="en"?"Free":"免费"):fmt(deliv);
  document.getElementById("coTotal").textContent=fmt(sub+deliv);
  if(user){ document.getElementById("coName").value=user.name||""; if(user.method==="phone")document.getElementById("coPhone").value=user.id; }
  document.getElementById("coForm").style.display="";
  document.getElementById("coOk").style.display="none";
  document.getElementById("coModal").classList.add("open"); document.body.style.overflow="hidden";
}
document.getElementById("checkout").onclick=openCheckout;
document.querySelectorAll("[data-coclose]").forEach(b=>b.onclick=()=>{document.getElementById("coModal").classList.remove("open");document.body.style.overflow="";});
document.querySelectorAll("#payList .payopt").forEach(o=>o.onclick=()=>{
  document.querySelectorAll("#payList .payopt").forEach(x=>x.classList.remove("on")); o.classList.add("on"); payMethod=o.dataset.p;
});
document.getElementById("coSubmit").onclick=()=>{
  const nm=document.getElementById("coName").value.trim(), ph=document.getElementById("coPhone").value.trim();
  if(!nm||ph.replace(/\D/g,"").length<8){ alert({mn:"Нэр болон утасны дугаараа бүрэн оруулна уу.",en:"Please enter your name and phone.",cn:"请填写姓名和电话。"}[lang]); return; }
  const pm={qpay:"QPay",bank:T().bankName,cash:T().cashName}[payMethod];
  document.getElementById("coOkMsg").textContent={
    mn:`Баярлалаа, ${nm}! Захиалга хүлээн авлаа. Төлбөр: ${pm}. Бид удахгүй 8998 3612-оос холбогдоно. (жишээ дэмо)`,
    en:`Thank you, ${nm}! Order received. Payment: ${pm}. We will contact you soon. (demo)`,
    cn:`谢谢，${nm}！已收到订单。支付方式：${pm}。我们会尽快联系您。（演示）`}[lang];
  document.getElementById("coForm").style.display="none";
  document.getElementById("coOk").style.display="";
  cart=[]; renderCart();
};

/* ============ AUTH ============ */
let authMode="reg", authMethod="phone";
function openAuth(){
  if(user){ // logged in -> log out
    if(confirm({mn:"Гарах уу?",en:"Log out?",cn:"退出登录？"}[lang])){ user=null; updateAcct(); }
    return;
  }
  document.getElementById("authForm").style.display="";
  document.getElementById("authOk").style.display="none";
  setAuthMode("reg"); document.getElementById("authModal").classList.add("open"); document.body.style.overflow="hidden";
}
function setAuthMode(m){
  authMode=m;
  document.getElementById("tabReg").classList.toggle("on",m==="reg");
  document.getElementById("tabLog").classList.toggle("on",m==="log");
  document.getElementById("nameField").style.display=m==="reg"?"":"none";
  document.getElementById("authSubmit").textContent=m==="reg"?T().signup:T().login;
}
function setAuthMethod(m){
  authMethod=m;
  document.querySelectorAll("#methodSeg button").forEach(b=>b.classList.toggle("on",b.dataset.m===m));
  document.getElementById("idLabel").textContent=m==="phone"?T().fPhone:T().fEmail;
  document.getElementById("iId").value="";
}
document.getElementById("tabReg").onclick=()=>setAuthMode("reg");
document.getElementById("tabLog").onclick=()=>setAuthMode("log");
document.querySelectorAll("#methodSeg button").forEach(b=>b.onclick=()=>setAuthMethod(b.dataset.m));
document.getElementById("acctOpen").onclick=openAuth;
document.querySelectorAll("[data-aclose]").forEach(b=>b.onclick=()=>{document.getElementById("authModal").classList.remove("open");document.body.style.overflow="";});
document.getElementById("authSubmit").onclick=()=>{
  const id=document.getElementById("iId").value.trim(), nm=document.getElementById("iName").value.trim();
  const okId = authMethod==="phone" ? id.replace(/\D/g,"").length>=8 : /\S+@\S+\.\S+/.test(id);
  if(!okId){ alert({mn:"Утас эсвэл имэйлээ зөв оруулна уу.",en:"Enter a valid phone or email.",cn:"请输入有效的电话或邮箱。"}[lang]); return; }
  if(authMode==="reg" && !nm){ alert({mn:"Нэрээ оруулна уу.",en:"Enter your name.",cn:"请输入姓名。"}[lang]); return; }
  user={name:nm||id, id, method:authMethod};
  document.getElementById("okTitle").textContent = authMode==="reg"?{mn:"Бүртгэл амжилттай!",en:"Welcome aboard!",cn:"注册成功！"}[lang]:{mn:"Тавтай морил!",en:"Welcome back!",cn:"欢迎回来！"}[lang];
  document.getElementById("okMsg").textContent={mn:"Та одоо хурдан захиалга хийх боломжтой.",en:"You can now check out faster.",cn:"现在您可以更快地结账。"}[lang];
  document.getElementById("authForm").style.display="none";
  document.getElementById("authOk").style.display="";
  updateAcct();
};
function updateAcct(){
  const btn=document.getElementById("acctOpen"), lbl=document.getElementById("acctLabel");
  if(user){ btn.classList.add("logged"); lbl.textContent=(user.name||"").split(" ")[0]||T().greeting; }
  else { btn.classList.remove("logged"); lbl.textContent=""; }
}

/* ============ DOCK ============ */
function buildDock(){
  const dock=document.getElementById("dock");
  PRODUCTS.slice(0,8).forEach(p=>{
    const d=document.createElement("div"); d.className="di"; d.dataset.name=p.name[lang].split(" ").slice(0,2).join(" ");
    d.innerHTML=`<img src="${IMG[p.img]}">`; d.onclick=()=>openModal(p.id); dock.appendChild(d);
  });
  dock.addEventListener("mousemove",e=>{
    [...dock.children].forEach(c=>{
      const r=c.getBoundingClientRect(); const cx=r.left+r.width/2;
      const dist=Math.abs(e.clientX-cx); const s=Math.max(1,1.6-dist/140);
      c.style.transform=`scale(${s}) translateY(${-(s-1)*16}px)`; c.style.margin=`0 ${(s-1)*5}px`;
    });
  });
  dock.addEventListener("mouseleave",()=>[...dock.children].forEach(c=>{c.style.transform="";c.style.margin="";}));
}

/* ============ NAV PILL ============ */
const links=[...document.querySelectorAll(".navlinks a")];
const pill=document.getElementById("pill");
function movePill(el){ if(!el)return; pill.style.opacity=1; pill.style.width=el.offsetWidth+"px"; pill.style.transform=`translateX(${el.offsetLeft}px)`; }
function activeLink(){ return links.find(l=>l.classList.contains("active"))||links[0]; }
links.forEach(l=>{
  l.addEventListener("mouseenter",()=>movePill(l));
  l.addEventListener("click",()=>{links.forEach(x=>x.classList.remove("active"));l.classList.add("active");});
});
document.getElementById("navlinks").addEventListener("mouseleave",()=>movePill(activeLink()));

/* ============ LANG ============ */
document.querySelectorAll("#lang button").forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll("#lang button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    lang=b.dataset.l; applyI18N(); setTimeout(()=>movePill(activeLink()),60); };
});

/* ============ SCROLL / REVEAL / HEADER ============ */
function observeReveal(){
  const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll(".reveal:not(.in)").forEach(el=>io.observe(el));
}
window.addEventListener("scroll",()=>{
  document.getElementById("header").classList.toggle("scrolled",scrollY>20);
  // section spy
  const secs=["products","about","contact"]; let cur="products";
  secs.forEach(id=>{const el=document.getElementById(id); if(el&&el.getBoundingClientRect().top<240) cur=id;});
  links.forEach(l=>l.classList.toggle("active",l.getAttribute("href")==="#"+cur));
  movePill(activeLink());
});

/* ============ MOBILE NAV ============ */
const burger=document.getElementById("burger"),mob=document.getElementById("mobnav");
burger.onclick=()=>{mob.classList.toggle("open");burger.classList.toggle("x");};
mob.querySelectorAll("a").forEach(a=>a.onclick=()=>mob.classList.remove("open"));

/* ============ SPARKLES ============ */
function buildSparkles(){
  const s=document.getElementById("sparkles");
  for(let i=0;i<18;i++){
    const sp=document.createElement("div"); sp.className="sparkle";
    sp.style.left=Math.random()*100+"%"; sp.style.top=(40+Math.random()*60)+"%";
    sp.style.animationDuration=(6+Math.random()*7)+"s"; sp.style.animationDelay=(Math.random()*7)+"s";
    sp.style.width=sp.style.height=(3+Math.random()*5)+"px"; s.appendChild(sp);
  }
}

/* ============ INIT ============ */
applyI18N(); buildDock(); buildSparkles(); observeReveal(); setAuthMethod("phone"); setAuthMode("reg");
setTimeout(()=>movePill(activeLink()),200);
</script>
</body>
</html>
